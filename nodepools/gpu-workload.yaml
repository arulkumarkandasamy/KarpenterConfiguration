apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-workload
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default # or a specific gpu-optimized nodeclass
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"] # GPUs are often hard to get on Spot
        - key: "karpenter.k8s.aws/instance-family"
          operator: In
          values: ["g4dn", "g5"]
  disruption:
    consolidationPolicy: WhenEmpty